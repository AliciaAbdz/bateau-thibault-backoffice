<div class="flex flex-col min-h-screen" style="background: linear-gradient(to bottom, rgba(197, 255, 199, 0.1) 0%, rgba(186, 255, 189, 0.1) 100%)">
  <!-- Header -->
  <mobile-header [StepName]="'REGISTER'" [showUserMenu]="false"></mobile-header>

  <!-- Contenu -->
  <div class="flex-1 flex flex-col items-center px-6 py-8">
    <!-- Logo -->
    <div class="w-32 mb-8">
      <img src="/images/Logo_icon.png" alt="FreshPilot Logo" class="w-full h-full object-contain" />
    </div>

    <!-- Card formulaire -->
    <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-xs flex flex-col items-center">
      <!-- Icône utilisateur -->
      <div class="w-20 h-20 rounded-full border-4 border-[#7BC67E] flex items-center justify-center mb-6">
        <svg class="w-10 h-10 text-[#7BC67E]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </div>

      <!-- Champ Identifiant -->
      <div class="w-full mb-4">
        <label class="text-xs text-gray-500 uppercase mb-1 block">Identifiant</label>
        <input type="text" class="w-full bg-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-[#7BC67E]" />
      </div>

      <!-- Champ Mot de passe -->
      <div class="w-full mb-4">
        <label class="text-xs text-gray-500 uppercase mb-1 block">Mot de passe</label>
        <input type="password" class="w-full bg-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-[#7BC67E]" />
      </div>

      <!-- Champ Confirmer mot de passe -->
      <div class="w-full mb-2">
        <label class="text-xs text-gray-500 uppercase mb-1 block">Mot de passe</label>
        <input type="password" class="w-full bg-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-[#7BC67E]" />
      </div>
    </div>

    <!-- Bouton Register -->
    <button class="mt-8 px-12 py-3 bg-[#7BC67E] text-white text-lg font-bold uppercase rounded-full shadow-md hover:opacity-90">
      REGISTER
    </button>
  </div>

  <!-- Footer -->
  <app-bottom-nav-mobile></app-bottom-nav-mobile>
</div>
