<header class="flex justify-between items-center px-4 py-3 bg-gradient-to-br from-green-500 to-green-400 shadow-md sticky top-0 z-[1000] min-h-[60px] max-[360px]:px-3 max-[360px]:py-2 md:px-6 md:py-4">
  <!-- Logo et nom de l'application -->
  <div class="flex-1 flex items-center">
    <div class="text-lg font-semibold text-white uppercase tracking-wide max-[360px]:text-base md:text-xl">
      {{StepName}}
    </div>
  </div>

  <!-- Section utilisateur -->
  <div class="relative flex items-center" *ngIf="user">
    <div
      class="flex items-center gap-2 cursor-pointer p-1.5 rounded-lg transition-colors duration-200 hover:bg-white/10"
      [ngClass]="{'bg-white/15': isUserMenuOpen}"
      (click)="toggleUserMenu()"
      style="-webkit-tap-highlight-color: transparent; touch-action: manipulation;"
    >
      <!-- Avatar utilisateur -->
      <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white shadow-md bg-white flex items-center justify-center flex-shrink-0 max-[360px]:w-9 max-[360px]:h-9 md:w-11 md:h-11">
        <img
          *ngIf="user.avatarUrl; else initialsAvatar"
          [src]="user.avatarUrl"
          [alt]="user.name"
          class="w-full h-full object-cover"
        />
        <ng-template #initialsAvatar>
          <div class="text-sm font-semibold text-green-500">{{ getUserInitials() }}</div>
        </ng-template>
      </div>

      <!-- Badge rôle (masqué sur très petits écrans) -->
      <div class="hidden min-[375px]:flex items-center gap-1.5 bg-white px-3 py-1.5 rounded-2xl shadow-md transition-all duration-200 hover:translate-y-[-1px] hover:shadow-lg md:px-4 md:py-2">
        <span class="text-sm">👤</span>
        <span class="text-xs font-semibold text-green-500 uppercase whitespace-nowrap md:text-[13px]">{{ user.role }}</span>
      </div>
    </div>

    <!-- Dropdown menu utilisateur -->
    <div
      *ngIf="isUserMenuOpen && showUserMenu"
      class="absolute top-[calc(100%+0.5rem)] right-0 min-w-[220px] max-w-[280px] bg-white rounded-xl shadow-2xl z-[1001] overflow-hidden animate-slideDown max-[360px]:min-w-[200px] md:min-w-[240px]"
    >
      <div class="p-2">
        <div class="p-4 bg-gradient-to-br from-gray-50 to-gray-100 rounded-lg mb-2">
          <p class="text-[15px] font-semibold text-gray-800 mb-1 break-words">{{ user.name }}</p>
          <p class="text-[13px] text-gray-600 uppercase font-medium">{{ user.role }}</p>
        </div>

        <div class="h-px bg-gray-200 my-2"></div>

        <button
          class="flex items-center gap-3 w-full px-4 py-3 bg-transparent border-none rounded-lg cursor-pointer transition-all duration-200 text-sm text-gray-800 text-left hover:bg-gray-50 hover:translate-x-0.5 active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-green-500 focus-visible:outline-offset-2"
          style="-webkit-tap-highlight-color: transparent; touch-action: manipulation;"
          (click)="navigateToProfile()"
        >
          <span class="text-lg flex-shrink-0">👤</span>
          <span>Mon profil</span>
        </button>

        <div class="h-px bg-gray-200 my-2"></div>

        <button
          class="flex items-center gap-3 w-full px-4 py-3 bg-transparent border-none rounded-lg cursor-pointer transition-all duration-200 text-sm text-red-500 text-left hover:bg-red-50 hover:translate-x-0.5 active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-green-500 focus-visible:outline-offset-2"
          style="-webkit-tap-highlight-color: transparent; touch-action: manipulation;"
          (click)="onLogout()"
        >
          <span class="text-lg flex-shrink-0">🚪</span>
          <span>Déconnexion</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Overlay pour fermer le menu au clic extérieur -->
  <div
    *ngIf="isUserMenuOpen"
    class="fixed inset-0 z-[999] bg-transparent"
    (click)="closeUserMenu()"
  ></div>
</header>
